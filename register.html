<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="css/register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="signup-container">
        <div class="form-box" id="signup-form">
            <form action="register.html">
                <h1>Sign Up</h1>
                <input type="email" name="email" placeholder="Email" required>
                <div class="password-field">
                    <input type="password" name="password" placeholder="password" id="re-password" required>
                    <j class="fa-solid fa-eye" id="repeat-show-password"></j>
                    <input type="password" name="password" placeholder="repeat password" id="re-password" required>
                    <i class="fa-solid fa-eye" id="repeat-show-password"></i>
                    <button type="submit" name="Sign Up">Sign Up</button>
                </div>
                
                <p>Already have an account?<a href="index.html" id="register-btn"> Login</a></p>
            </form>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
